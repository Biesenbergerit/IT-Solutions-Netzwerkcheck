name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "netzwerkcheck.py"
      - ".github/workflows/build-windows-exe.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Repository herunterladen
        uses: actions/checkout@v4

      - name: Python installieren
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller

      - name: Windows EXE bauen
        run: |
          python -m PyInstaller --onefile --windowed --clean --name "IT-Solutions-Netzwerkcheck" netzwerkcheck.py

      - name: ZIP für Website erstellen
        run: |
          powershell Compress-Archive -Path "dist\IT-Solutions-Netzwerkcheck.exe" -DestinationPath "IT-Solutions-Netzwerkcheck-Windows.zip" -Force

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: IT-Solutions-Netzwerkcheck-Windows
          path: IT-Solutions-Netzwerkcheck-Windows.zip
